name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@master
      - name: brew test-bot
        run: |
          brew tap datahub-project/tap "$GITHUB_WORKSPACE"
          brew test-bot --only-formulae --tap=datahub-project/tap
