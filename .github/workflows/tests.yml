name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - name: brew test-bot
        run: |
          # setup-homebrew already taps this repo as datahub-project/tap from
          # the checkout; re-tapping with the local path fails with a "remote
          # mismatch" error, so rely on the existing tap.
          brew test-bot --only-formulae --tap=datahub-project/tap
