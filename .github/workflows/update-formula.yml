name: Update formula on PyPI release

# Fully automated: hourly, detect a new acryl-datahub release on PyPI, bump the
# formula (url + sha256 + the full pinned Python resource tree), build & test it
# on macOS and Linux, and only then open a PR and merge it. Nothing merges unless
# both builds pass, so no human is in the loop on a green release.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  # Cheap hourly check -- no Homebrew, just compare PyPI to the formula.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.v.outputs.bump }}
      new: ${{ steps.v.outputs.latest }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: |
          latest=$(curl -fsS https://pypi.org/pypi/acryl-datahub/json | jq -r .info.version)
          current=$(grep -oE 'acryl_datahub-[0-9.]+\.tar\.gz' Formula/datahub.rb | head -1 | sed -E 's/.*-([0-9.]+)\.tar\.gz/\1/')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ]; then
            echo "bump=true"  >> "$GITHUB_OUTPUT"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi
          echo "PyPI: $latest | Formula: $current"

  # Generate the bumped formula once (macOS) and validate it builds there.
  # The resulting formula file is shared with the Linux test and merge jobs.
  generate:
    needs: prepare
    if: needs.prepare.outputs.bump == 'true'
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      NEW: ${{ needs.prepare.outputs.new }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Generate bumped formula
        run: |
          # PyPI lookups are done in Python with json.loads(strict=False): some
          # PyPI metadata contains raw control characters that strict jq rejects.

          # Neither `brew bump-formula-pr` nor an in-place `brew
          # update-python-resources` works here: both share an updater that
          # aborts whenever the SET of Python resources changes between releases
          # -- which it does for acryl-datahub on nearly every bump (deps
          # added/removed, plus PyPI name case normalization like PyYAML ->
          # pyyaml). So we bump the main url/sha256 ourselves, generate a fresh
          # resource section with --print-only (which skips the brittle
          # reconciliation), and splice it in, replacing the old section.

          # setup-homebrew already taps this repo as datahub-project/tap from the
          # checkout, so edits below land on the files git tracks here.

          # 1. Bump the top-level url + sha256 (the stanza before the first resource).
          python3 - "$NEW" <<'PY'
          import json, re, sys, urllib.request
          new = sys.argv[1]
          data = urllib.request.urlopen(
              f"https://pypi.org/pypi/acryl-datahub/{new}/json").read().decode()
          meta = json.loads(data, strict=False)
          sdist = next(u for u in meta["urls"] if u["packagetype"] == "sdist")
          url, sha = sdist["url"], sdist["digests"]["sha256"]
          path = "Formula/datahub.rb"
          src = open(path).read()
          cut = src.index('resource "')          # only touch the package's own stanza
          head, tail = src[:cut], src[cut:]
          head = re.sub(r'url "[^"]*"', f'url "{url}"', head, count=1)
          head = re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', head, count=1)
          open(path, "w").write(head + tail)
          PY

          # 2. Resolve the new dependency tree; capture fresh blocks on stdout.
          brew update-python-resources --print-only --version "$NEW" \
            datahub-project/tap/datahub > resources.txt

          # 2b. update-python-resources always picks sdists, but click-spinner's
          #     sdist setup.py uses configparser.SafeConfigParser (removed in
          #     py3.12+) and can't build on python@3.13. Re-pin its universal
          #     wheel -- this re-applies a manual fix the regeneration clobbers.
          python3 - <<'PY'
          import json, re, urllib.request
          data = urllib.request.urlopen(
              "https://pypi.org/pypi/click-spinner/0.1.10/json").read().decode()
          meta = json.loads(data, strict=False)
          wheel = next(u for u in meta["urls"] if u["packagetype"] == "bdist_wheel")
          url, sha = wheel["url"], wheel["digests"]["sha256"]
          path = "resources.txt"
          s = open(path).read()
          def repl(m):
              b = re.sub(r'url "[^"]*"', f'url "{url}"', m.group(0))
              return re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', b)
          s, n = re.subn(r'  resource "click-spinner" do.*?\n  end', repl, s, flags=re.S)
          if n != 1:
              raise SystemExit(f"expected 1 click-spinner block, patched {n}")
          open(path, "w").write(s)
          print("re-pinned click-spinner to wheel:", url)
          PY

          # 3. Replace the whole resource section with the generated blocks.
          python3 - <<'PY'
          path = "Formula/datahub.rb"
          src = open(path).read()
          blocks = open("resources.txt").read().rstrip()
          if not blocks.lstrip().startswith("resource "):
              raise SystemExit("no resource blocks generated; aborting")
          start = src.index('  resource "')
          end   = src.index('  def install')
          open(path, "w").write(src[:start] + blocks + "\n\n" + src[end:])
          PY
          rm -f resources.txt

      - name: Upload generated formula
        uses: actions/upload-artifact@v4
        with:
          name: formula
          path: Formula/datahub.rb

      - name: Build & test (macOS)
        run: |
          brew install --build-from-source --verbose datahub-project/tap/datahub
          brew test --verbose datahub-project/tap/datahub

  # Independently build & test the same generated formula on Linux.
  test-linux:
    needs: [prepare, generate]
    if: needs.prepare.outputs.bump == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: actions/download-artifact@v4
        with:
          name: formula
          path: dl
      - name: Build & test (Linux)
        run: |
          cp dl/datahub.rb Formula/datahub.rb
          brew install --build-from-source --verbose datahub-project/tap/datahub
          brew test --verbose datahub-project/tap/datahub

  # Both platforms are green -- open the PR and merge it.
  merge:
    needs: [prepare, generate, test-linux]
    if: needs.prepare.outputs.bump == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEW: ${{ needs.prepare.outputs.new }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: formula
          path: dl
      - name: Commit, open PR, and merge
        run: |
          cp dl/datahub.rb Formula/datahub.rb
          branch="bump-acryl-datahub-${NEW}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/datahub.rb
          git commit -m "datahub ${NEW}"
          # Push with the token in the URL: the credential actions/checkout
          # persists isn't reachable for git push here. Force in case a stale
          # branch from an interrupted run exists.
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${branch}"
          gh pr create --base main --head "$branch" \
            --title "datahub ${NEW}" \
            --body "Automated bump to acryl-datahub ${NEW} (url, sha256 and Python resources). Built and tested on macOS and Linux before merge." \
            || echo "PR already exists for ${branch}"
          # Merge (retry briefly while GitHub computes mergeability).
          for i in 1 2 3 4 5 6; do
            gh pr merge "$branch" --squash --delete-branch && break || sleep 10
          done
