name: Update formula on PyPI release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Determine latest vs current version
        id: pypi
        run: |
          latest=$(curl -fsS https://pypi.org/pypi/acryl-datahub/json | jq -r .info.version)
          current=$(grep -oE 'acryl_datahub-[0-9.]+\.tar\.gz' Formula/datahub.rb | head -1 | sed -E 's/.*-([0-9.]+)\.tar\.gz/\1/')
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Latest PyPI: $latest"
          echo "Formula:     $current"

      - name: Bump formula
        if: steps.pypi.outputs.latest != steps.pypi.outputs.current
        env:
          NEW: ${{ steps.pypi.outputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          meta=$(curl -fsS "https://pypi.org/pypi/acryl-datahub/${NEW}/json")
          sdist=$(echo "$meta" | jq -r '.urls[] | select(.packagetype=="sdist") | .url')
          sha=$(echo "$meta"   | jq -r '.urls[] | select(.packagetype=="sdist") | .digests.sha256')

          # Neither `brew bump-formula-pr` nor an in-place `brew
          # update-python-resources` works here: both share an updater that
          # aborts ("Unable to update resource blocks automatically") whenever
          # the SET of Python resources changes between releases -- which it does
          # for acryl-datahub on nearly every bump (deps added/removed, plus PyPI
          # name case normalization like PyYAML -> pyyaml). So we bump the main
          # url/sha256 ourselves, generate a fresh resource section with
          # --print-only (which skips the brittle reconciliation), and splice it
          # in, replacing the old section wholesale.

          # setup-homebrew already taps this repo as datahub-project/tap from the
          # checkout, so edits below land on the files git tracks here.

          # 1. Bump the top-level url + sha256 (the stanza before the first resource).
          python3 - "$sdist" "$sha" <<'PY'
          import re, sys
          sdist, sha = sys.argv[1], sys.argv[2]
          path = "Formula/datahub.rb"
          src = open(path).read()
          cut = src.index('resource "')          # only touch the package's own stanza
          head, tail = src[:cut], src[cut:]
          head = re.sub(r'url "[^"]*"', f'url "{sdist}"', head, count=1)
          head = re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', head, count=1)
          open(path, "w").write(head + tail)
          PY

          # 2. Resolve the new dependency tree and capture fresh resource blocks
          #    on stdout (progress goes to stderr).
          brew update-python-resources --print-only --version "$NEW" \
            datahub-project/tap/datahub > resources.txt

          # 3. Replace the entire resource section (first `resource` .. the line
          #    before `def install`) with the freshly generated blocks.
          python3 - <<'PY'
          path = "Formula/datahub.rb"
          src = open(path).read()
          blocks = open("resources.txt").read().rstrip()
          if not blocks.lstrip().startswith("resource "):
              raise SystemExit("no resource blocks generated; aborting")
          start = src.index('  resource "')
          end   = src.index('  def install')
          open(path, "w").write(src[:start] + blocks + "\n\n" + src[end:])
          PY
          rm -f resources.txt

          # 4. Open a PR with the result.
          branch="bump-acryl-datahub-${NEW}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/datahub.rb
          git commit -m "datahub ${NEW}"
          # Push with the token in the URL: the credential actions/checkout
          # persists isn't reachable once setup-homebrew taps this repo.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${branch}"
          gh pr create --base main --head "$branch" \
            --title "datahub ${NEW}" \
            --body "Automated bump to acryl-datahub ${NEW} (url, sha256 and Python resources)."
