name: Update formula on PyPI release

# Fully automated: hourly, detect a new acryl-datahub release on PyPI, bump the
# formula (url + sha256 + the full pinned Python resource tree), build a bottle
# (prebuilt binary) on each supported platform, publish the bottles to a GitHub
# Release, wire the `bottle do` block into the formula, and merge it. Nothing
# merges unless every bottle builds and the CLI passes its test, so no human is
# in the loop on a green release.
#
# Bottles mean users get an instant `brew install` (download + unpack) instead
# of a ~30-minute from-source compile, and because the bottles are Release
# assets we get a per-platform install download counter we own.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "(Re)build and bottle the current PyPI version even if the formula already matches"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  # Cheap hourly check -- no Homebrew, just compare PyPI to the formula.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.v.outputs.bump }}
      new: ${{ steps.v.outputs.latest }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: |
          latest=$(curl -fsS https://pypi.org/pypi/acryl-datahub/json | jq -r .info.version)
          current=$(grep -oE 'acryl_datahub-[0-9.]+\.tar\.gz' Formula/datahub.rb | head -1 | sed -E 's/.*-([0-9.]+)\.tar\.gz/\1/')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "bump=true"  >> "$GITHUB_OUTPUT"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi
          echo "PyPI: $latest | Formula: $current | force: ${{ inputs.force }}"

  # Produce the bumped formula once and share it; both bottle builds and the
  # publish step start from this identical file.
  generate:
    needs: prepare
    if: needs.prepare.outputs.bump == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      NEW: ${{ needs.prepare.outputs.new }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Generate bumped formula
        run: |
          # PyPI lookups are done in Python with json.loads(strict=False): some
          # PyPI metadata contains raw control characters that strict jq rejects.

          # Neither `brew bump-formula-pr` nor an in-place `brew
          # update-python-resources` works here: both share an updater that
          # aborts whenever the SET of Python resources changes between releases
          # -- which it does for acryl-datahub on nearly every bump (deps
          # added/removed, plus PyPI name case normalization like PyYAML ->
          # pyyaml). So we bump the main url/sha256 ourselves, generate a fresh
          # resource section with --print-only (which skips the brittle
          # reconciliation), and splice it in, replacing the old section.

          # setup-homebrew already taps this repo as datahub-project/tap from the
          # checkout, so edits below land on the files git tracks here.

          # 1. Bump the top-level url + sha256 (the stanza before the first resource).
          python3 - "$NEW" <<'PY'
          import json, re, sys, urllib.request
          new = sys.argv[1]
          data = urllib.request.urlopen(
              f"https://pypi.org/pypi/acryl-datahub/{new}/json").read().decode()
          meta = json.loads(data, strict=False)
          sdist = next(u for u in meta["urls"] if u["packagetype"] == "sdist")
          url, sha = sdist["url"], sdist["digests"]["sha256"]
          path = "Formula/datahub.rb"
          src = open(path).read()
          cut = src.index('resource "')          # only touch the package's own stanza
          head, tail = src[:cut], src[cut:]
          head = re.sub(r'url "[^"]*"', f'url "{url}"', head, count=1)
          head = re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', head, count=1)
          # Drop any bottle block from the previous version so publish writes a
          # fresh one for this version (the sha256 cellar: lines never collide
          # with the package's own `sha256 "..."` above).
          head = re.sub(r'\n  bottle do\n.*?\n  end\n', '\n', head, flags=re.S, count=1)
          open(path, "w").write(head + tail)
          PY

          # 2. Resolve the new dependency tree; capture fresh blocks on stdout.
          brew update-python-resources --print-only --version "$NEW" \
            datahub-project/tap/datahub > resources.txt

          # 2b. update-python-resources always picks sdists, but click-spinner's
          #     sdist setup.py uses configparser.SafeConfigParser (removed in
          #     py3.12+) and can't build on python@3.13. Re-pin its universal
          #     wheel -- this re-applies a manual fix the regeneration clobbers.
          python3 - <<'PY'
          import json, re, urllib.request
          data = urllib.request.urlopen(
              "https://pypi.org/pypi/click-spinner/0.1.10/json").read().decode()
          meta = json.loads(data, strict=False)
          wheel = next(u for u in meta["urls"] if u["packagetype"] == "bdist_wheel")
          url, sha = wheel["url"], wheel["digests"]["sha256"]
          path = "resources.txt"
          s = open(path).read()
          def repl(m):
              b = re.sub(r'url "[^"]*"', f'url "{url}"', m.group(0))
              return re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', b)
          s, n = re.subn(r'  resource "click-spinner" do.*?\n  end', repl, s, flags=re.S)
          if n != 1:
              raise SystemExit(f"expected 1 click-spinner block, patched {n}")
          open(path, "w").write(s)
          print("re-pinned click-spinner to wheel:", url)
          PY

          # 3. Replace the whole resource section with the generated blocks.
          python3 - <<'PY'
          path = "Formula/datahub.rb"
          src = open(path).read()
          blocks = open("resources.txt").read().rstrip()
          if not blocks.lstrip().startswith("resource "):
              raise SystemExit("no resource blocks generated; aborting")
          start = src.index('  resource "')
          end   = src.index('  def install')
          open(path, "w").write(src[:start] + blocks + "\n\n" + src[end:])
          PY
          rm -f resources.txt

      - name: Upload generated formula
        uses: actions/upload-artifact@v4
        with:
          name: formula
          path: Formula/datahub.rb

  # Build a bottle on each platform. This IS the build gate: a bottle can only be
  # produced from a successful --build-bottle install, and `brew test` exercises
  # the resulting CLI. Each leg uploads its bottle tarball + json.
  bottle:
    needs: [prepare, generate]
    if: needs.prepare.outputs.bump == 'true'
    strategy:
      fail-fast: true
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      NEW: ${{ needs.prepare.outputs.new }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: actions/download-artifact@v4
        with:
          name: formula
          path: dl
      - name: Build bottle
        run: |
          cp dl/datahub.rb Formula/datahub.rb
          # Bottles are downloaded from this Release URL once published; bake the
          # matching root_url into the bottle json now (the release itself is
          # created later, in publish).
          root_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/datahub-${NEW}"
          brew install --build-bottle --verbose datahub-project/tap/datahub
          brew test --verbose datahub-project/tap/datahub
          brew bottle --json --no-rebuild --root-url="$root_url" \
            datahub-project/tap/datahub
          ls -la ./*.bottle.*
      - name: Upload bottle
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            ./*.bottle.tar.gz
            ./*.bottle.json
          if-no-files-found: error

  # All bottles built -- publish them to a Release, wire the bottle block into
  # the formula, and merge.
  publish:
    needs: [prepare, generate, bottle]
    if: needs.prepare.outputs.bump == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEW: ${{ needs.prepare.outputs.new }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish bottles and merge formula
        run: |
          # Start from the generated formula (no bottle block yet).
          cp artifacts/formula/datahub.rb Formula/datahub.rb

          # Gather the per-platform bottle files.
          mkdir -p bottles
          find artifacts -name '*.bottle.tar.gz' -exec cp {} bottles/ \;
          find artifacts -name '*.bottle.json'   -exec cp {} bottles/ \;
          echo "Collected bottles:" && ls -la bottles/

          tag="datahub-${NEW}"

          # Create the Release if missing (idempotent for retried runs).
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "datahub ${NEW}" \
              --notes "Homebrew bottles for acryl-datahub ${NEW}."
          fi

          # Upload each bottle as a Release asset under the EXACT name Homebrew
          # will request. Local bottle files use a double dash (datahub--<v>...),
          # but the download name is the json's "filename" (single dash) and the
          # install URL is root_url + "/" + filename -- so derive the name from
          # the json rather than guessing. --clobber keeps retries idempotent.
          python3 - <<'PY' > upload_map.txt
          import glob, json
          for jf in glob.glob("bottles/*.bottle.json"):
              for _, data in json.load(open(jf)).items():
                  for _, t in data["bottle"]["tags"].items():
                      print(t["local_filename"], t["filename"])
          PY
          while read -r local download; do
            cp "bottles/$local" "bottles/$download"
            gh release upload "$tag" "bottles/$download" --clobber
          done < upload_map.txt

          # Write the `bottle do ... end` block (root_url + per-platform sha256)
          # into the formula from the bottle json files.
          brew bottle --merge --write --no-commit bottles/*.bottle.json

          # Commit, open PR, merge.
          branch="bump-acryl-datahub-${NEW}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/datahub.rb
          git commit -m "datahub ${NEW}"
          # Push with the token in the URL: the credential actions/checkout
          # persists isn't reachable for git push here. Force in case a stale
          # branch from an interrupted run exists.
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${branch}"
          gh pr create --base main --head "$branch" \
            --title "datahub ${NEW}" \
            --body "Automated bump to acryl-datahub ${NEW} with prebuilt bottles for macOS (arm64) and Linux (x86_64), published to the ${tag} release." \
            || echo "PR already exists for ${branch}"
          for i in 1 2 3 4 5 6; do
            gh pr merge "$branch" --squash --delete-branch && break || sleep 10
          done
