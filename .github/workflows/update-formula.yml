name: Update formula on PyPI release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Determine latest vs current version
        id: pypi
        run: |
          latest=$(curl -fsS https://pypi.org/pypi/acryl-datahub/json | jq -r .info.version)
          current=$(grep -oE 'acryl_datahub-[0-9.]+\.tar\.gz' Formula/datahub.rb | head -1 | sed -E 's/.*-([0-9.]+)\.tar\.gz/\1/')
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Latest PyPI: $latest"
          echo "Formula:     $current"

      - name: Bump formula
        if: steps.pypi.outputs.latest != steps.pypi.outputs.current
        env:
          NEW: ${{ steps.pypi.outputs.latest }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          meta=$(curl -fsS "https://pypi.org/pypi/acryl-datahub/${NEW}/json")
          sdist=$(echo "$meta" | jq -r '.urls[] | select(.packagetype=="sdist") | .url')
          sha=$(echo "$meta"   | jq -r '.urls[] | select(.packagetype=="sdist") | .digests.sha256')
          # setup-homebrew already taps this repo (datahub-project/tap) from its
          # checkout; re-tapping with the local path triggers a "remote mismatch"
          # error, so we rely on the existing tap here.
          # --install-dependencies lets bump-formula-pr install python@3.13,
          # rust and openssl@3 so it can build the virtualenv and regenerate the
          # pinned Python resource blocks. Without it the runner has no build
          # deps and resource resolution fails instantly.
          brew bump-formula-pr --no-browse --no-fork --install-dependencies \
            --url "$sdist" --sha256 "$sha" \
            datahub-project/tap/datahub
